# Matrix 本地开发 Nginx 配置
# 用于反向代理 Conduwuit 和 Element Web
# 本地开发使用 HTTP, 生产环境需要启用 HTTPS

# Conduwuit Matrix API
server {
    listen 8008;
    server_name localhost;

    # 增大客户端上传大小 (媒体文件)
    client_max_body_size 50M;

    # Matrix Client-Server API
    location /_matrix/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持 (Sync v2)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;
    }

    # Swagger API 文档
    location /docs/ {
        alias /Users/mori/mactirx-test/docs/swagger-ui/;
        index index.html;
    }

    location /docs/specs/ {
        alias /Users/mori/mactirx-test/docs/specs/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # .well-known 用于客户端发现
    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver":{"base_url":"http://localhost:8008"},"m.identity_server":{"base_url":""}}';
    }

    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server":"localhost:8008"}';
    }
}

# Element Web 静态文件服务
server {
    listen 8080;
    server_name localhost;

    # Element Web 构建产物目录
    # 注意: 需要根据实际路径修改
    root /Users/mori/mactirx-test/source/element-web/webapp;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
